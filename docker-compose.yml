services:
  # --- Auth Service (Port 5001) ---
  auth-service:
    build:
      context: ./backend/auth-service
    container_name: placement_portal_auth
    restart: unless-stopped
    dns: 
      - 8.8.8.8 
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 5001
      MONGO_URI: ${MONGO_URI_AUTH}
      MONGO_URI_PROFILE: ${MONGO_URI_PROFILE}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      TPO_ADMIN_EMAIL: ${TPO_ADMIN_EMAIL}
      SKIP_CAPTCHA_VERIFICATION: ${SKIP_CAPTCHA_VERIFICATION}
    volumes:
      - auth-uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis-cache:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks: [app-network]

  # --- Job Service (Port 5003) ---
  job-service:
    build:
      context: ./backend/job-service
    container_name: placement_portal_job
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 5003
      MONGO_URI: ${MONGO_URI_JOB}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      mongo:
        condition: service_healthy
    networks: [app-network]

  # --- Application Service (Port 5004) ---
  application-service:
    build:
      context: ./backend/application-service
    container_name: placement_portal_application
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 5004
      MONGO_URI: ${MONGO_URI_APP}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      JOB_SERVICE_URL: ${JOB_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      SUPPORT_SERVICE_URL: ${SUPPORT_SERVICE_URL:-http://support-service:5006}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      mongo:
        condition: service_healthy
      job-service:
        condition: service_started
    networks: [app-network]

  # --- Notification Service (Port 5005) ---
  notification-service:
    build:
      context: ./backend/notification-service
    container_name: placement_portal_notification
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 5005
      MONGO_URI: ${MONGO_URI_NOTIFY}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks: [app-network]

  # --- Support Service (Port 5006) - Consolidated service for: announcements, hackathons, tasks, messaging, skills, quiz ---
  support-service:
    build:
      context: ./backend/support-service
    container_name: placement_portal_support
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 5006
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/placemint}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      APPLICATION_SERVICE_URL: ${APPLICATION_SERVICE_URL}
      JUDGE0_API_KEY: ${JUDGE0_API_KEY}
      JUDGE0_API_HOST: ${JUDGE0_API_HOST}
    depends_on:
      mongo:
        condition: service_healthy
    networks: [app-network]

  # --- Interview Service (Port 5011) --- 
  interview-service:
    build:
      context: ./backend/interview-service
    container_name: placement_portal_interview
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 5011
      MONGO_URI_INTERVIEW: mongodb://mongo:27017/interview-service
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
    depends_on:
      mongo:
        condition: service_healthy
    networks: [app-network]

  # --- API Gateway (Nginx) ---
  api-gateway:
    image: nginx:stable-alpine
    container_name: placement_portal_gateway
    restart: unless-stopped
    ports:
      - "5000:80"
    volumes:
      - ./gateway/nginx.conf.template:/etc/nginx/conf.d/default.conf.template:ro
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5001
      - JOB_SERVICE_URL=http://job-service:5003
      - APPLICATION_SERVICE_URL=http://application-service:5004
      - NOTIFICATION_SERVICE_URL=http://notification-service:5005
      - SUPPORT_SERVICE_URL=http://support-service:5006
      - INTERVIEW_SERVICE_URL=http://interview-service:5011
    command: /bin/sh -c "envsubst '$$AUTH_SERVICE_URL,$$JOB_SERVICE_URL,$$APPLICATION_SERVICE_URL,$$NOTIFICATION_SERVICE_URL,$$SUPPORT_SERVICE_URL,$$INTERVIEW_SERVICE_URL' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - auth-service
      - job-service
      - application-service
      - notification-service
      - support-service
      - interview-service
    networks: [app-network]

  # --- Frontend Service (React) ---
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_RECAPTCHA_SITE_KEY=${REACT_APP_RECAPTCHA_SITE_KEY}
    container_name: placement_portal_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks: [app-network]

  # --- Database & Cache & Event Bus ---
  mongo:
    image: mongo:latest
    container_name: placement_portal_mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [app-network]

  redis-cache:
    image: redis:alpine
    container_name: placement_portal_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [app-network]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: placement_portal_rabbitmq
    restart: unless-stopped
    ports:
      - "15672:15672"  # Management UI (dev only)
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [app-network]

volumes:
  mongo-data:
  auth-uploads:

networks:
  app-network:
    driver: bridge